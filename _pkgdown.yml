url: https://davidahirshberg.github.io/balancing/

template:
  bootstrap: 5
  includes:
    in_header: |
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]});"></script>

reference:
  - title: "Estimation"
    contents:
      - balancing_estimate
      - survival_effect

  - title: "Estimands"
    contents:
      - treatment_specific_mean
      - vcate
      - risk_ratio
      - survival_probability_ate
      - survival_probability_tsm
      - rmst_ate

  - title: "Kernels"
    contents:
      - matern_kernel
      - direct_product_kernel
      - kernel_matrix

  - title: "Dispersions"
    contents:
      - entropy_dispersion
      - softplus_dispersion
      - quadratic_dispersion
      - sign_flip_dispersion

  - title: "Tuning"
    contents:
      - lepski_tuning
      - cv_tuning
      - oracle_tuning
      - fixed_tuning
      - tuning_context

  - title: "Survival pipeline"
    contents:
      - fit_lambda
      - fit_gamma
      - pool_folds
      - mesh_project
      - discrete_grid
      - continuous_grid

  - title: "Bootstrap and inference"
    contents:
      - bootstrap
      - bootstrap_t_interval
      - percentile_bootstrap_interval

  - title: "Internals"
    desc: >
      Internal functions not part of the public API.
    contents:
      - matches(".")
